<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CardVault">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>CardVault</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent-dim: #b8cc35;
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* SCREENS */
    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }

    /* HEADER */
    .header {
      padding: env(safe-area-inset-top, 20px) 20px 0;
      padding-top: max(env(safe-area-inset-top), 20px);
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .icon-btn:active { background: var(--surface2); }
    .icon-btn svg { width: 18px; height: 18px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; }

    /* SEARCH */
    .search-wrap {
      padding: 0 20px 16px;
      flex-shrink: 0;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      gap: 10px;
    }
    .search-box svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      width: 100%;
      padding: 12px 0;
    }
    .search-box input::placeholder { color: var(--text3); }

    /* CARDS LIST */
    .cards-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
      padding-bottom: max(env(safe-area-inset-bottom), 20px);
    }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 16px 0 10px;
    }

    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .card-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card-item:active { transform: scale(0.985); }
    .card-item:active::before { opacity: 1; }

    .card-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-item-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .card-item-type {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .card-item-fields {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-label {
      font-size: 12px;
      color: var(--text3);
      min-width: 80px;
    }

    .field-val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text2);
    }

    .copy-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .copy-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .copy-chip:active, .copy-chip.copied {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .copy-chip svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state .big { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 24px);
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(232, 255, 71, 0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 100;
    }
    .fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(232, 255, 71, 0.2); }
    .fab svg { width: 22px; height: 22px; stroke: #000; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    /* FORM SCREEN */
    .form-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: max(env(safe-area-inset-top), 20px) 20px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .back-btn svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; }

    .form-title {
      font-size: 17px;
      font-weight: 500;
    }

    .form-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .form-scroll::-webkit-scrollbar { display: none; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: none; height: 80px; }
    .form-group select option { background: #1e1e1e; }

    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .type-opt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-opt.selected {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.08);
      color: var(--accent);
    }
    .type-opt .type-icon { font-size: 20px; margin-bottom: 4px; }
    .type-opt .type-name { font-size: 13px; font-weight: 500; }

    .dynamic-fields { margin-top: 8px; }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .save-btn:active { opacity: 0.85; }

    .delete-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: #ff5555;
      border: 1px solid #ff5555;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    .delete-btn:active { background: rgba(255, 85, 85, 0.1); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 30px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #000;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* INSTALL BANNER */
    .install-banner {
      margin: 0 20px 12px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .install-banner .inst-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
    .install-banner .inst-text strong { color: var(--text); }
    .install-banner .inst-close { color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- LIST SCREEN -->
  <div class="screen active" id="screen-list">
    <div class="header">
      <div class="header-row">
        <div class="logo">CardVault</div>
        <div class="icon-btn" id="btn-settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
      </div>
    </div>

    <div id="install-banner" class="install-banner" style="display:none">
      <div class="inst-text"><strong>Установи как приложение</strong><br>Нажми «Поделиться» → «На экран Домой»</div>
      <div class="inst-close" id="install-close">✕</div>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" placeholder="Поиск карты...">
      </div>
    </div>

    <div class="cards-scroll" id="cards-list">
      <!-- populated by JS -->
    </div>

    <button class="fab" id="fab-add">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- ADD/EDIT SCREEN -->
  <div class="screen" id="screen-form">
    <div class="form-header">
      <div class="back-btn" id="btn-back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="form-title" id="form-title">Новая карта</div>
    </div>

    <div class="form-scroll">
      <div class="form-group">
        <label>Название карты</label>
        <input type="text" id="f-name" placeholder="Например: Сбербанк дебетовая">
      </div>

      <div class="form-group">
        <label>Тип</label>
        <div class="type-grid" id="type-grid">
          <div class="type-opt selected" data-type="bank">
            <div class="type-icon">💳</div>
            <div class="type-name">Банковская</div>
          </div>
          <div class="type-opt" data-type="bonus">
            <div class="type-icon">⭐</div>
            <div class="type-name">Бонусная</div>
          </div>
          <div class="type-opt" data-type="transport">
            <div class="type-icon">🚇</div>
            <div class="type-name">Транспортная</div>
          </div>
          <div class="type-opt" data-type="other">
            <div class="type-icon">🗂</div>
            <div class="type-name">Другое</div>
          </div>
        </div>
      </div>

      <div class="dynamic-fields" id="dynamic-fields"></div>

      <div class="form-group">
        <label>Заметка</label>
        <textarea id="f-note" placeholder="Дополнительная информация..."></textarea>
      </div>

      <button class="save-btn" id="btn-save">Сохранить</button>
      <button class="delete-btn" id="btn-delete" style="display:none">Удалить карту</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const FIELDS = {
  bank: [
    { id: 'number', label: 'Номер карты', placeholder: '0000 0000 0000 0000' },
    { id: 'holder', label: 'Держатель', placeholder: 'IVAN IVANOV' },
    { id: 'expiry', label: 'Срок действия', placeholder: 'MM/YY' },
    { id: 'cvv', label: 'CVV', placeholder: '•••' },
    { id: 'phone', label: 'Телефон (для оплаты)', placeholder: '+7 999 000 00 00' },
  ],
  bonus: [
    { id: 'number', label: 'Номер карты / ID', placeholder: '1234567890' },
    { id: 'barcode', label: 'Штрих-код', placeholder: 'Номер штрих-кода' },
    { id: 'pin', label: 'PIN / Пароль', placeholder: '••••' },
  ],
  transport: [
    { id: 'number', label: 'Номер карты', placeholder: '1234 5678 9012 3456' },
    { id: 'balance', label: 'Баланс', placeholder: '100 ₽' },
  ],
  other: [
    { id: 'number', label: 'Номер / ID', placeholder: '—' },
    { id: 'code', label: 'Код доступа', placeholder: '—' },
  ]
};

let cards = JSON.parse(localStorage.getItem('cardvault_cards') || '[]');
let currentType = 'bank';
let editingId = null;

function save() {
  localStorage.setItem('cardvault_cards', JSON.stringify(cards));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const orig = el.innerHTML;
    el.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Скопировано`;
    setTimeout(() => { el.innerHTML = orig; el.classList.remove('copied'); }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Скопировано!');
  });
}

function renderList(filter = '') {
  const container = document.getElementById('cards-list');
  let filtered = cards.filter(c => 
    c.name.toLowerCase().includes(filter.toLowerCase()) ||
    (c.fields.number || '').includes(filter)
  );

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">${filter ? '🔍' : '💳'}</div>
      <p>${filter ? 'Ничего не найдено' : 'Нет карт.<br>Нажми + чтобы добавить'}</p>
    </div>`;
    return;
  }

  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.type]) groups[c.type] = [];
    groups[c.type].push(c);
  });

  const typeNames = { bank: 'Банковские', bonus: 'Бонусные', transport: 'Транспортные', other: 'Прочее' };
  const typeIcons = { bank: '💳', bonus: '⭐', transport: '🚇', other: '🗂' };

  let html = '';
  Object.entries(groups).forEach(([type, list]) => {
    html += `<div class="section-label">${typeIcons[type]} ${typeNames[type]}</div>`;
    list.forEach(card => {
      const chips = Object.entries(card.fields)
        .filter(([k, v]) => v)
        .map(([k, v]) => {
          const fieldDef = FIELDS[card.type]?.find(f => f.id === k);
          const lbl = fieldDef?.label || k;
          const safe = v.replace(/"/g, '&quot;');
          return `<div class="copy-chip" onclick="event.stopPropagation(); copyText('${safe}', this)"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>${lbl}</div>`;
        }).join('');

      const preview = Object.entries(card.fields)
        .filter(([k, v]) => v && k !== 'cvv' && k !== 'pin' && k !== 'code')
        .slice(0, 2)
        .map(([k, v]) => {
          const fieldDef = FIELDS[card.type]?.find(f => f.id === k);
          const lbl = fieldDef?.label || k;
          let display = v;
          if (k === 'number' && v.length > 4) display = '•••• ' + v.slice(-4);
          return `<div class="field-row"><span class="field-label">${lbl}</span><span class="field-val">${display}</span></div>`;
        }).join('');

      html += `<div class="card-item" onclick="openEdit('${card.id}')">
        <div class="card-item-top">
          <div class="card-item-name">${card.name}</div>
          <div class="card-item-type">${typeIcons[card.type]}</div>
        </div>
        <div class="card-item-fields">${preview}</div>
        ${card.note ? `<div style="margin-top:8px; font-size:13px; color:var(--text3)">${card.note}</div>` : ''}
        <div class="copy-row">${chips}</div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

function renderDynamicFields(type) {
  const fields = FIELDS[type] || [];
  const container = document.getElementById('dynamic-fields');
  container.innerHTML = fields.map(f => `
    <div class="form-group">
      <label>${f.label}</label>
      <input type="text" id="ff-${f.id}" placeholder="${f.placeholder}" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  `).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openAdd() {
  editingId = null;
  currentType = 'bank';
  document.getElementById('form-title').textContent = 'Новая карта';
  document.getElementById('f-name').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.querySelectorAll('.type-opt').forEach(o => o.classList.toggle('selected', o.dataset.type === 'bank'));
  renderDynamicFields('bank');
  showScreen('screen-form');
}

function openEdit(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  editingId = id;
  currentType = card.type;
  document.getElementById('form-title').textContent = 'Редактировать';
  document.getElementById('f-name').value = card.name;
  document.getElementById('f-note').value = card.note || '';
  document.getElementById('btn-delete').style.display = 'block';
  document.querySelectorAll('.type-opt').forEach(o => o.classList.toggle('selected', o.dataset.type === card.type));
  renderDynamicFields(card.type);
  FIELDS[card.type]?.forEach(f => {
    const el = document.getElementById(`ff-${f.id}`);
    if (el) el.value = card.fields[f.id] || '';
  });
  showScreen('screen-form');
}

document.getElementById('fab-add').addEventListener('click', openAdd);
document.getElementById('btn-back').addEventListener('click', () => { showScreen('screen-list'); renderList(document.getElementById('search-input').value); });

document.getElementById('type-grid').addEventListener('click', e => {
  const opt = e.target.closest('.type-opt');
  if (!opt) return;
  currentType = opt.dataset.type;
  document.querySelectorAll('.type-opt').forEach(o => o.classList.toggle('selected', o === opt));
  renderDynamicFields(currentType);
});

document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Введи название карты'); return; }

  const fields = {};
  FIELDS[currentType]?.forEach(f => {
    const el = document.getElementById(`ff-${f.id}`);
    if (el && el.value.trim()) fields[f.id] = el.value.trim();
  });

  if (editingId) {
    const idx = cards.findIndex(c => c.id === editingId);
    cards[idx] = { ...cards[idx], name, type: currentType, fields, note: document.getElementById('f-note').value.trim() };
  } else {
    cards.push({ id: Date.now().toString(), name, type: currentType, fields, note: document.getElementById('f-note').value.trim(), created: Date.now() });
  }

  save();
  showScreen('screen-list');
  renderList();
  showToast(editingId ? 'Карта обновлена' : 'Карта добавлена');
});

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!confirm('Удалить карту?')) return;
  cards = cards.filter(c => c.id !== editingId);
  save();
  showScreen('screen-list');
  renderList();
  showToast('Карта удалена');
});

document.getElementById('search-input').addEventListener('input', e => renderList(e.target.value));

// Install banner for iOS
const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone = navigator.standalone;
const dismissed = localStorage.getItem('install_dismissed');
if (isIOS && !isStandalone && !dismissed) {
  document.getElementById('install-banner').style.display = 'flex';
}
document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install_dismissed', '1');
});

renderList();
  // Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
</html>
